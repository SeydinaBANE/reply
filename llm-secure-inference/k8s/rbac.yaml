apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-secure-inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-secure-inference
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-secure-inference
subjects:
  - kind: ServiceAccount
    name: llm-secure-inference
roleRef:
  kind: Role
  name: llm-secure-inference
  apiGroup: rbac.authorization.k8s.io
