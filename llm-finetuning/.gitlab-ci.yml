stages: [quality, test, eval]

default:
  image: python:3.11-slim
  before_script:
    - pip install -e ".[dev]"

lint:
  stage: quality
  script: [ruff check src tests]

typecheck:
  stage: quality
  script: [mypy src]

test:
  stage: test
  script: [pytest -q]

eval-gate:
  stage: eval
  script:
    - python -m finetune --eval-data data/eval.jsonl --report eval_report.json
  artifacts:
    paths: [eval_report.json]
  only: [tags]
