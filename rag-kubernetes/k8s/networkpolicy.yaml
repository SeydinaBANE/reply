apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rag-service
  labels:
    app: rag-service
spec:
  podSelector:
    matchLabels:
      app: rag-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 443
          protocol: TCP
